<!DOCTYPE html>
<html lang="zh-Hant" class="w-screen h-screen overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【羅馬字-聲母+結合韻】教學遊戲</title>
    
    <!-- 預連接 CDN 加速檔案下載 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    
    <!-- 使用 crossorigin 載入教育部白話字專用「芫荽」字型樣式表 -->
    <link rel="preload" href="https://cdn.jsdelivr.net/gh/cmex-tw/iansui/webfont/iansui.css" as="style" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/cmex-tw/iansui/webfont/iansui.css" crossorigin="anonymous">
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* 雙通道保障：直接以 @font-face 宣告字型檔案，優化特殊符號與調符顯示 */
        @font-face {
            font-family: 'Iansui';
            src: url('https://cdn.jsdelivr.net/gh/cmex-tw/iansui/webfont/iansui.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/gh/cmex-tw/iansui/webfont/iansui.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        :root {
            /* 針對大投影螢幕與手機，設計嚴格的視窗高度比例，確保文字不跑出格子 */
            --item-h: clamp(140px, 38vh, 400px);
            --scale-1: 0.76;
            --scale-2: 0.63;
            --scale-3: 0.50;
            --scale-4: 0.40;
            --scale-welcome: 0.24;
        }

        @media (max-width: 640px) {
            :root {
                --item-h: clamp(110px, 25vh, 200px);
                --scale-1: 0.68;
                --scale-2: 0.56;
                --scale-3: 0.45;
                --scale-4: 0.36;
                --scale-welcome: 0.20;
            }
        }

        /* 強制全局所有元素 100% 使用芫荽字型，備用字型防跑版 */
        *, *::before, *::after, input, button, select, textarea {
            font-family: 'Iansui', '芫荽', 'BiauKai', -apple-system, BlinkMacSystemFont, sans-serif !important;
        }

        body {
            background: radial-gradient(circle at 50% 35%, #e11d48 0%, #be123c 35%, #881337 70%, #4c0519 100%);
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        /* 預防下延伸字元被卡片邊緣切掉的底邊偏置 */
        .prevent-clip {
            padding-bottom: 0.12em;
        }

        .rose-glow {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.95), 0 0 25px rgba(225, 29, 72, 0.85), inset 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* 雙色 LED 閃爍燈泡動畫 */
        @keyframes led-blink-odd {
            0%, 100% { opacity: 1; transform: scale(1.1); background-color: #ef4444; }
            50% { opacity: 0.35; transform: scale(0.9); background-color: #881337; }
        }
        @keyframes led-blink-even {
            0%, 100% { opacity: 0.35; transform: scale(0.9); background-color: #facc15; }
            50% { opacity: 1; transform: scale(1.1); background-color: #4c0519; }
        }

        .led-odd { animation: led-blink-odd 1.2s infinite; }
        .led-even { animation: led-blink-even 1.2s infinite; }

        .slot-reel {
            transition: transform 1.5s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        .slot-reel-instant {
            transition: none !important;
        }

        /* 等比例字體縮放樣式 */
        .text-len-1 { font-size: calc(var(--item-h) * var(--scale-1)); line-height: 1; }
        .text-len-2 { font-size: calc(var(--item-h) * var(--scale-2)); line-height: 1; }
        .text-len-3 { font-size: calc(var(--item-h) * var(--scale-3)); line-height: 1; }
        .text-len-4 { font-size: calc(var(--item-h) * var(--scale-4)); line-height: 1; }
        .text-welcome { font-size: calc(var(--item-h) * var(--scale-welcome)); line-height: 1.1; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.2); border-radius: 999px; }
        ::-webkit-scrollbar-thumb { background: rgba(225, 29, 72, 0.5); border-radius: 999px; }
    </style>
</head>
<body class="w-screen h-screen overflow-hidden flex flex-col justify-between text-white relative">

    <!-- 彩色煙火畫布 -->
    <canvas id="confetti-canvas" class="absolute inset-0 pointer-events-none z-40 w-full h-full"></canvas>

    <!-- 頂部標題區 -->
    <header class="h-[10vh] flex items-center justify-between px-6 sm:px-12 relative z-30 select-none">
        <div class="absolute left-1/2 top-[92%] -translate-x-1/2 -translate-y-1/2 z-10">
            <h1 class="text-3xl sm:text-4xl md:text-5xl lg:text-6xl font-extrabold tracking-wide text-yellow-300 whitespace-nowrap"
                style="text-shadow: 0 0 15px rgba(253, 224, 71, 0.95), 0 2px 8px rgba(0,0,0,0.85);">
                Siaⁿ-bó kap kiat-ha̍p-ūn
            </h1>
        </div>
        <div class="w-1"></div>
    </header>

    <!-- 中部主拉霸區 -->
    <main class="h-[68vh] flex items-center justify-center px-4 relative z-20">
        <div class="w-[95vw] max-w-[1200px] bg-gradient-to-b from-[#be123c] via-[#881337] to-[#4c0519] p-4 sm:p-7 rounded-[2.5rem] border-2 border-rose-400/80 rose-glow relative flex flex-col justify-center">
            
            <!-- 上排 LED 點狀燈 -->
            <div class="absolute top-2 left-0 right-0 flex justify-around px-8 z-10">
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
            </div>

            <!-- 拉霸白色雙卡片 -->
            <div class="grid grid-cols-2 gap-4 sm:gap-6 relative my-1">
                
                <!-- 左滾筒 (聲母) -->
                <div class="relative overflow-hidden bg-white rounded-[2rem] shadow-xl border border-rose-200/50" 
                     style="height: var(--item-h);">
                    <div id="left-slot-trigger" class="absolute inset-0 cursor-pointer z-10 hover:bg-rose-500/5 transition duration-150 flex flex-col items-center justify-between"></div>
                    <div id="left-shield" class="absolute inset-0 z-20 pointer-events-none"></div>
                    
                    <div id="left-reel" class="slot-reel flex flex-col items-center w-full"></div>
                </div>

                <!-- 右滾筒 (結合韻) -->
                <div class="relative overflow-hidden bg-white rounded-[2rem] shadow-xl border border-purple-200/50" 
                     style="height: var(--item-h);">
                    <div id="right-slot-trigger" class="absolute inset-0 cursor-pointer z-10 hover:bg-purple-500/5 transition duration-150 flex flex-col items-center justify-between"></div>
                    <div id="right-shield" class="absolute inset-0 z-20 pointer-events-none"></div>
                    
                    <div id="right-reel" class="slot-reel flex flex-col items-center w-full"></div>
                </div>
            </div>

            <!-- 下排 LED 點狀燈 -->
            <div class="absolute bottom-2 left-0 right-0 flex justify-around px-8 z-10">
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
                <div class="w-1.5 h-1.5 rounded-full led-even"></div>
                <div class="w-1.5 h-1.5 rounded-full led-odd"></div>
            </div>
        </div>
    </main>

    <!-- 底部控制區 -->
    <footer class="h-[22vh] flex flex-col justify-between pb-8 px-4 sm:px-8 relative z-30 select-none">
        <div class="flex items-center justify-center space-x-2 sm:space-x-3 max-w-xl mx-auto w-full mb-1">
            <button id="sync-spin-btn" 
                    class="flex-[2] py-2.5 sm:py-3 px-4 bg-gradient-to-r from-yellow-400 via-amber-500 to-orange-600 border border-white text-white hover:brightness-105 rounded-full text-sm sm:text-base font-black tracking-wider shadow-lg active:scale-95 transition-all text-center">
                Tâng-chê tńg!
            </button>

            <button id="chart-btn" 
                    class="flex-[1.5] py-2.5 sm:py-3 px-3 bg-white hover:bg-rose-50 border border-rose-400 text-rose-950 rounded-full text-xs sm:text-sm font-bold tracking-wider shadow-lg active:scale-95 transition-all flex items-center justify-center gap-0.5">
                📋 對照字表
            </button>

            <button id="bgm-toggle-btn" 
                    class="px-2 py-2 sm:px-2.5 sm:py-2.5 rounded-full text-[10px] sm:text-xs font-bold flex items-center gap-1 bg-slate-900/80 hover:bg-slate-800 text-slate-200 border border-rose-500/40 transition duration-150 shadow-md">
                <span id="bgm-indicator" class="w-1.5 h-1.5 rounded-full bg-neutral-400 transition-all duration-300"></span>
                <span id="bgm-text" class="text-white">🎵 OFF</span>
            </button>
            
            <button id="gear-btn" 
                    class="w-7 h-7 sm:w-8 sm:h-8 rounded-full bg-slate-900/80 hover:bg-slate-800 border border-rose-500/40 transition duration-150 shadow-lg text-xs sm:text-sm flex items-center justify-center text-white">
                ⚙️
            </button>
        </div>

        <div class="max-w-xl mx-auto w-full px-4">
            <div class="flex items-center justify-between gap-1 sm:gap-2">
                <div id="progress-container" class="flex-1 flex justify-between gap-1.5 sm:gap-2"></div>
            </div>
        </div>
    </footer>

    <!-- 全螢幕對照字表 -->
    <section id="chart-overlay" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-50 hidden flex-col justify-between p-6 sm:p-10 select-none">
        <div class="flex items-center justify-between border-b border-rose-500/25 pb-4">
            <h2 class="text-2xl sm:text-4xl font-black text-yellow-300 flex items-center gap-2">
                <span>📋</span> Siaⁿ-bó kap kiat-ha̍p-ūn 對照字表
            </h2>
            <button id="close-chart-btn" class="px-5 py-2.5 bg-red-600/90 hover:bg-red-500 rounded-xl text-white font-bold transition duration-150 shadow-md">
                關
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 my-auto overflow-y-auto max-h-[72vh] py-4 pr-1">
            <div class="lg:col-span-6 flex flex-col">
                <h3 class="text-lg sm:text-xl font-extrabold text-amber-300 mb-3 border-l-4 border-amber-400 pl-3">
                    Siaⁿ-bó (聲母)
                </h3>
                <div id="grid-sia" class="grid grid-cols-5 sm:grid-cols-6 gap-2"></div>
            </div>

            <div class="lg:col-span-6 flex flex-col">
                <h3 class="text-lg sm:text-xl font-extrabold text-purple-300 mb-3 border-l-4 border-purple-400 pl-3">
                    Kiat-ha̍p-ūn (結合韻)
                </h3>
                <div id="grid-phi" class="grid grid-cols-4 sm:grid-cols-5 gap-2"></div>
            </div>
        </div>
    </section>

    <!-- 自訂教材面板 -->
    <section id="settings-overlay" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-[#050b14] border border-rose-500/20 rounded-[2rem] max-w-lg w-full p-6 sm:p-8 shadow-2xl relative text-white flex flex-col max-h-[85vh]">
            <h2 class="text-2xl sm:text-3xl font-black text-rose-400 mb-5 flex items-center gap-2 pb-1">
                <span class="text-purple-400 filter drop-shadow-[0_0_8px_rgba(168,85,247,0.4)]">⚙️</span> 編輯白話字教材
            </h2>
            <div class="grid grid-cols-2 gap-4 mb-3 text-sm sm:text-base font-bold select-none">
                <div class="text-amber-200">左欄聲母</div>
                <div class="text-purple-300">右欄結合韻</div>
            </div>
            <div id="settings-inputs-container" class="flex-1 overflow-y-auto space-y-2 pr-2 mb-6"></div>
            <div class="flex items-center justify-end space-x-3 pt-4 border-t border-slate-800 select-none">
                <button id="cancel-settings-btn" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold transition duration-150">
                    關閉
                </button>
                <button id="save-settings-btn" class="px-6 py-2.5 bg-gradient-to-r from-rose-500 to-amber-500 hover:from-rose-400 hover:to-amber-400 text-white rounded-xl font-black shadow-lg transition duration-150">
                    儲存並重啟
                </button>
            </div>
        </div>
    </section>

    <!-- 20 題通關完成視窗 -->
    <section id="completion-overlay" class="fixed inset-0 bg-slate-950/95 backdrop-blur-lg z-50 hidden flex-col items-center justify-center p-4">
        <div class="text-center max-w-md w-full">
            <span class="text-8xl sm:text-9xl filter drop-shadow-[0_0_35px_rgba(244,63,94,0.8)] block animate-bounce">🏆</span>
            <h2 class="text-4xl sm:text-6xl font-black text-yellow-300 mt-6 tracking-widest">Oân-sêng!</h2>
            <h3 class="text-xl sm:text-2xl text-white font-semibold mt-3 tracking-wider">課堂通關 20 題完全達標！</h3>
            <p class="text-xs sm:text-sm text-rose-100/60 mt-4 leading-relaxed px-4">Tāi-ke lóng chin gāu! 大家都很優秀！</p>
            <button id="reset-game-btn" class="mt-8 px-8 py-3.5 bg-gradient-to-r from-yellow-400 via-amber-500 to-rose-600 border-2 border-white text-white font-extrabold text-lg sm:text-xl rounded-2xl shadow-2xl active:scale-95 transition-all">
                Koh sńg chi̍t-pái (再玩一次)
            </button>
        </div>
    </section>

    <!-- 遊戲流程核心腳本 -->
    <script>
        // 預設左欄與右欄教材列表
        const DEFAULT_LEFT = ['p', 'ph', 'm', 'b', 't', 'th', 'n', 'l', 'k', 'kh', 'h', 'g', 'ng', 'ch', 'chh', 's', 'j'];
        const DEFAULT_RIGHT = ['ai', 'au', 'ia', 'iu', 'io', 'iai', 'ui', 'oa', 'oe', 'oai'];

        // 使用獨立儲存鍵，避免與鼻化母音舊檔互相覆蓋
        let leftWords = JSON.parse(localStorage.getItem('slot_left_words_combine')) || DEFAULT_LEFT;
        let rightWords = JSON.parse(localStorage.getItem('slot_right_words_combine')) || DEFAULT_RIGHT;

        let audioCtx = null, isBgmOn = false, bgmIntervalId = null;
        let currentCycleState = 'welcome', totalQuestionsCount = 20, currentQuestion = 0; 
        let currentLeftTargetIdx = 0, currentRightTargetIdx = 0, lastTapTime = 0;

        const leftReel = document.getElementById('left-reel'), rightReel = document.getElementById('right-reel');
        const leftShield = document.getElementById('left-shield'), rightShield = document.getElementById('right-shield');
        const progressContainer = document.getElementById('progress-container');
        const bgmToggleBtn = document.getElementById('bgm-toggle-btn'), bgmIndicator = document.getElementById('bgm-indicator'), bgmText = document.getElementById('bgm-text');
        const gearBtn = document.getElementById('gear-btn'), settingsOverlay = document.getElementById('settings-overlay'), cancelSettingsBtn = document.getElementById('cancel-settings-btn'), saveSettingsBtn = document.getElementById('save-settings-btn'), settingsInputsContainer = document.getElementById('settings-inputs-container');
        const chartBtn = document.getElementById('chart-btn'), chartOverlay = document.getElementById('chart-overlay'), closeChartBtn = document.getElementById('close-chart-btn'), gridSia = document.getElementById('grid-sia'), gridPhi = document.getElementById('grid-phi');
        const syncSpinBtn = document.getElementById('sync-spin-btn'), completionOverlay = document.getElementById('completion-overlay'), resetGameBtn = document.getElementById('reset-game-btn');

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playSpinTickSound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(650, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.03);
                gain.gain.setValueAtTime(0.12, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                osc.start(); osc.stop(audioCtx.currentTime + 0.03);
            } catch (e) {}
        }

        function playVictoryChord() {
            if (!audioCtx) return;
            try {
                const notes = [261.63, 329.63, 392.00, 523.25], playTime = audioCtx.currentTime;
                notes.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(freq, playTime + index * 0.08);
                    gain.gain.setValueAtTime(0, playTime + index * 0.08); gain.gain.linearRampToValueAtTime(0.18, playTime + index * 0.08 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, playTime + index * 0.08 + 0.3);
                    osc.start(playTime + index * 0.08); osc.stop(playTime + index * 0.08 + 0.35);
                });
            } catch (e) {}
        }

        const excitingArpeggio = [220.00, 261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];
        const energeticPatterns = [[0, 3, 5, 3, 7, 5, 8, 7], [3, 5, 7, 5, 8, 7, 10, 8], [2, 5, 6, 5, 8, 6, 9, 8], [1, 4, 6, 4, 7, 6, 8, 7]];
        let currentBar = 0, currentStep = 0;

        function startBGM() {
            if (bgmIntervalId) return;
            initAudio();
            bgmIntervalId = setInterval(() => {
                if (!isBgmOn || !audioCtx) return;
                const noteFreq = excitingArpeggio[energeticPatterns[currentBar][currentStep]];
                try {
                    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    if (currentStep % 2 === 0) {
                        osc.type = 'sawtooth'; gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.045, audioCtx.currentTime + 0.02); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
                    } else {
                        osc.type = 'triangle'; gain.gain.setValueAtTime(0, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0.035, audioCtx.currentTime + 0.01); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
                    }
                    osc.frequency.setValueAtTime(noteFreq, audioCtx.currentTime); osc.start(); osc.stop(audioCtx.currentTime + 0.5);
                } catch (e) {}
                currentStep = (currentStep + 1) % 8; if (currentStep === 0) currentBar = (currentBar + 1) % energeticPatterns.length;
            }, 160);
        }

        function stopBGM() { if (bgmIntervalId) { clearInterval(bgmIntervalId); bgmIntervalId = null; } }
        function toggleBGM() {
            initAudio(); isBgmOn = !isBgmOn;
            if (isBgmOn) {
                bgmIndicator.classList.remove('bg-neutral-400'); bgmIndicator.classList.add('bg-emerald-400', 'animate-ping'); bgmText.textContent = '🎵 ON'; startBGM();
            } else {
                bgmIndicator.classList.remove('bg-emerald-400', 'animate-ping'); bgmIndicator.classList.add('bg-neutral-400'); bgmText.textContent = '🎵 OFF'; stopBGM();
            }
        }

        const canvas = document.getElementById('confetti-canvas'), ctx = canvas.getContext('2d');
        let particles = [], animationFrameId = null;
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        class Particle {
            constructor(x, y, vx, vy) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.size = Math.random() * 8 + 6;
                const colors = ['#f59e0b', '#fbbf24', '#fef08a', '#ea580c', '#3b82f6', '#06b6d4', '#e11d48', '#22c55e', '#a855f7'];
                this.color = colors[Math.floor(Math.random() * colors.length)]; this.alpha = 1; this.rotation = Math.random() * Math.PI * 2; this.rotationSpeed = (Math.random() - 0.5) * 0.15; this.gravity = 0.12;
            }
            update() { this.x += this.vx; this.y += this.vy; this.vy += this.gravity; this.rotation += this.rotationSpeed; this.alpha -= 0.01; }
            draw() { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rotation); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color; ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size); ctx.restore(); }
        }

        function triggerConfetti() {
            for (let i = 0; i < 45; i++) {
                let angle1 = -Math.random() * 0.25 * Math.PI - 0.1 * Math.PI, speed1 = Math.random() * 12 + 10;
                particles.push(new Particle(0, window.innerHeight, Math.cos(angle1) * speed1, Math.sin(angle1) * speed1));
                let angle2 = -Math.random() * 0.25 * Math.PI - 0.65 * Math.PI, speed2 = Math.random() * 12 + 10;
                particles.push(new Particle(window.innerWidth, window.innerHeight, Math.cos(angle2) * speed2, Math.sin(angle2) * speed2));
            }
            if (!animationFrameId) tickConfetti();
        }

        function tickConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => { p.update(); p.draw(); });
            if (particles.length > 0) animationFrameId = requestAnimationFrame(tickConfetti); else animationFrameId = null;
        }

        function getTextScaleClass(text) {
            if (!text) return 'text-welcome';
            const len = text.replace(/ⁿ/g, 'n').replace(/o͘/g, 'o').length;
            if (len <= 1) return 'text-len-1'; if (len === 2) return 'text-len-2'; if (len === 3) return 'text-len-3';
            return 'text-len-4';
        }

        function buildReelDOM(reelElement, wordsList, startText, isRight) {
            reelElement.innerHTML = '';
            const initItem = document.createElement('div');
            initItem.className = `flex items-center justify-center font-black bg-white ${isRight ? 'text-[#7e22ce]' : 'text-[#881337]'} select-none text-welcome prevent-clip`;
            initItem.style.height = `var(--item-h)`; initItem.style.width = `100%`; initItem.textContent = startText;
            reelElement.appendChild(initItem);

            for (let r = 0; r < 4; r++) {
                wordsList.forEach(word => {
                    const item = document.createElement('div');
                    item.className = `flex items-center justify-center font-black bg-white ${isRight ? 'text-[#7e22ce]' : 'text-[#be123c]'} select-none ${getTextScaleClass(word)} prevent-clip`;
                    item.style.height = `var(--item-h)`; item.style.width = `100%`; item.textContent = word;
                    reelElement.appendChild(item);
                });
            }
        }

        function initReels() {
            buildReelDOM(leftReel, leftWords, "Chún-pī", false); buildReelDOM(rightReel, rightWords, "Khai-sí", true);
            leftReel.classList.add('slot-reel-instant'); rightReel.classList.add('slot-reel-instant');
            leftReel.style.transform = `translateY(0px)`; rightReel.style.transform = `translateY(0px)`;
        }

        function spinReelIndividual(reelElement, listSize, targetIndex, onComplete) {
            playSpinTickSound(); const itemHeight = reelElement.firstElementChild.offsetHeight;
            let ticksCount = 0, tickInterval = setInterval(() => { if (ticksCount < 10) { playSpinTickSound(); ticksCount++; } else clearInterval(tickInterval); }, 120);
            const finalStopIndex = 1 + (2 * listSize) + targetIndex;
            reelElement.classList.remove('slot-reel-instant'); reelElement.style.transform = `translateY(-${finalStopIndex * itemHeight}px)`;
            setTimeout(() => {
                reelElement.classList.add('slot-reel-instant'); reelElement.style.transform = `translateY(-${(1 + targetIndex) * itemHeight}px)`;
                if (onComplete) onComplete();
            }, 1500);
        }

        function cycleNextAction() {
            initAudio();
            if (currentCycleState === 'welcome') currentCycleState = 'ready';
            if (currentCycleState === 'ready') triggerSynchronizedSpin();
            else if (currentCycleState === 'idle') triggerCelebrateStep();
            else if (currentCycleState === 'celebrated') advanceToNextChallenge();
        }

        function triggerSynchronizedSpin() {
            if (currentCycleState === 'spinning') return;
            currentLeftTargetIdx = Math.floor(Math.random() * leftWords.length);
            currentRightTargetIdx = Math.floor(Math.random() * rightWords.length);
            currentCycleState = 'spinning';
            leftShield.classList.remove('pointer-events-none'); rightShield.classList.remove('pointer-events-none');
            syncSpinBtn.disabled = true;

            let completedReels = 0;
            const completeCallback = () => {
                completedReels++;
                if (completedReels === 2) {
                    currentCycleState = 'idle'; syncSpinBtn.textContent = "Tâng-chê tńg!"; syncSpinBtn.disabled = false;
                    leftShield.classList.add('pointer-events-none'); rightShield.classList.add('pointer-events-none');
                }
            };
            spinReelIndividual(leftReel, leftWords.length, currentLeftTargetIdx, completeCallback);
            spinReelIndividual(rightReel, rightWords.length, currentRightTargetIdx, completeCallback);
        }

        function triggerCelebrateStep() {
            if (currentQuestion < totalQuestionsCount) {
                const dots = progressContainer.querySelectorAll('.progress-dot');
                if (dots[currentQuestion]) {
                    dots[currentQuestion].classList.remove('border-white/45');
                    dots[currentQuestion].classList.add('bg-[#fbbf24]', 'border-[#f59e0b]', 'shadow-[0_0_10px_#f59e0b]');
                }
            }
            playVictoryChord(); triggerConfetti();
            currentCycleState = 'celebrated'; syncSpinBtn.textContent = "Tâng-chê tńg!";
        }

        function advanceToNextChallenge() {
            currentQuestion++;
            if (currentQuestion >= totalQuestionsCount) {
                completionOverlay.classList.remove('hidden'); completionOverlay.classList.add('flex');
                playVictoryChord(); setTimeout(triggerConfetti, 100); setTimeout(triggerConfetti, 400);
            } else {
                currentCycleState = 'ready'; syncSpinBtn.textContent = "Tâng-chê tńg!"; triggerSynchronizedSpin();
            }
        }

        function setupIndividualSlotClicks() {
            document.getElementById('left-slot-trigger').addEventListener('click', (e) => {
                e.stopPropagation(); initAudio(); const temp = Math.floor(Math.random() * leftWords.length);
                leftShield.classList.remove('pointer-events-none'); spinReelIndividual(leftReel, leftWords.length, temp, () => leftShield.classList.add('pointer-events-none'));
            });
            document.getElementById('right-slot-trigger').addEventListener('click', (e) => {
                e.stopPropagation(); initAudio(); const temp = Math.floor(Math.random() * rightWords.length);
                rightShield.classList.remove('pointer-events-none'); spinReelIndividual(rightReel, rightWords.length, temp, () => rightShield.classList.add('pointer-events-none'));
            });
        }

        function buildProgressDots() {
            progressContainer.innerHTML = '';
            for (let i = 0; i < totalQuestionsCount; i++) {
                const dot = document.createElement('div');
                dot.className = `progress-dot w-3.5 h-3.5 sm:w-4 sm:h-4 rounded-full border-2 border-white/45 bg-transparent transition-all duration-300`;
                progressContainer.appendChild(dot);
            }
        }

        function renderChartGrids() {
            gridSia.innerHTML = ''; gridPhi.innerHTML = '';
            leftWords.forEach(word => {
                const card = document.createElement('div'); card.className = "bg-amber-100 hover:bg-amber-200 text-amber-950 font-bold p-3 text-center rounded-xl cursor-pointer text-lg sm:text-2xl border border-amber-300 prevent-clip flex items-center justify-center shadow-sm active:scale-95 transition-all";
                card.textContent = word; card.addEventListener('click', () => { initAudio(); playSpinTickSound(); }); gridSia.appendChild(card);
            });
            rightWords.forEach(word => {
                const card = document.createElement('div'); card.className = "bg-purple-100 hover:bg-purple-200 text-purple-950 font-bold p-3 text-center rounded-xl cursor-pointer text-lg sm:text-2xl border border-purple-300 prevent-clip flex items-center justify-center shadow-sm active:scale-95 transition-all";
                card.textContent = word; card.addEventListener('click', () => { initAudio(); playSpinTickSound(); }); gridPhi.appendChild(card);
            });
        }

        function openSettingsPanel() {
            settingsInputsContainer.innerHTML = '';
            for (let i = 0; i < 18; i++) {
                const rowDiv = document.createElement('div'); rowDiv.className = "grid grid-cols-2 gap-4";
                rowDiv.innerHTML = `
                    <input type="text" class="settings-left-item bg-[#0b1324] border border-slate-800 text-amber-200 text-center rounded-xl py-2 px-3 font-semibold focus:border-amber-400 focus:outline-none text-base sm:text-lg" value="${leftWords[i] || ''}" placeholder="-">
                    <input type="text" class="settings-right-item bg-[#0b1324] border border-slate-800 text-purple-300 text-center rounded-xl py-2 px-3 font-semibold focus:border-purple-400 focus:outline-none text-base sm:text-lg" value="${rightWords[i] || ''}" placeholder="-">`;
                settingsInputsContainer.appendChild(rowDiv);
            }
            settingsOverlay.classList.remove('hidden'); settingsOverlay.classList.add('flex');
        }

        function closeSettingsPanel() { settingsOverlay.classList.add('hidden'); settingsOverlay.classList.remove('flex'); }
        function saveCustomSettings() {
            const cleanLeft = [], cleanRight = [];
            document.querySelectorAll('.settings-left-item').forEach(input => { const v = input.value.trim(); if (v) cleanLeft.push(v); });
            document.querySelectorAll('.settings-right-item').forEach(input => { const v = input.value.trim(); if (v) cleanRight.push(v); });
            if (cleanLeft.length === 0 || cleanRight.length === 0) return;
            leftWords = cleanLeft; rightWords = cleanRight;
            localStorage.setItem('slot_left_words_combine', JSON.stringify(leftWords)); localStorage.setItem('slot_right_words_combine', JSON.stringify(rightWords));
            closeSettingsPanel(); restartEntireProgress();
        }

        function restartEntireProgress() {
            currentQuestion = 0; currentCycleState = 'welcome'; syncSpinBtn.textContent = "Tâng-chê tńg!";
            completionOverlay.classList.add('hidden'); completionOverlay.classList.remove('flex');
            initReels(); buildProgressDots(); renderChartGrids();
        }

        function isInteractionLocked() {
            const typing = document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA');
            return !settingsOverlay.classList.contains('hidden') || !chartOverlay.classList.contains('hidden') || !completionOverlay.classList.contains('hidden') || typing;
        }

        function handleBackgroundTap(e) {
            if (isInteractionLocked()) return;
            if (e.target.closest('button') || e.target.closest('input') || e.target.closest('#left-slot-trigger') || e.target.closest('#right-slot-trigger')) return;
            const now = Date.now(); if (now - lastTapTime < 350) return; lastTapTime = now;
            cycleNextAction();
        }

        function setupAdaptiveInputListeners() {
            window.addEventListener('pointerdown', (e) => { if (e.pointerType === 'touch') handleBackgroundTap(e); });
            window.addEventListener('click', (e) => { if (e.pointerType !== 'touch') handleBackgroundTap(e); });
            window.addEventListener('keydown', (e) => {
                if (isInteractionLocked()) return;
                if (['Space', ' ', 'Enter', 'PageDown', 'PageUp', 'ArrowDown', 'ArrowUp'].includes(e.key) || e.code === 'Space') {
                    e.preventDefault(); cycleNextAction();
                }
            });
        }

        window.onload = function() {
            initReels(); buildProgressDots(); renderChartGrids(); setupIndividualSlotClicks(); setupAdaptiveInputListeners();
            gearBtn.addEventListener('click', (e) => { e.stopPropagation(); openSettingsPanel(); });
            cancelSettingsBtn.addEventListener('click', closeSettingsPanel); saveSettingsBtn.addEventListener('click', saveCustomSettings);
            chartBtn.addEventListener('click', (e) => { e.stopPropagation(); chartOverlay.classList.remove('hidden'); chartOverlay.classList.add('flex'); });
            closeChartBtn.addEventListener('click', () => { chartOverlay.classList.add('hidden'); chartOverlay.classList.remove('flex'); });
            syncSpinBtn.addEventListener('click', (e) => { e.stopPropagation(); cycleNextAction(); });
            resetGameBtn.addEventListener('click', restartEntireProgress); bgmToggleBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleBGM(); });
        };
    </script>
</body>
</html>
