<!DOCTYPE html>
<html lang="zh-Hant" class="w-full h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的頭殼頂發1蕊香菇-語詞複習</title>
    <!-- 引入全域 Tailwind CSS 樣式 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入五彩碎紙花特效庫 (Confetti) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- 雙通道載入白話字專用「芫荽」教育部字型 -->
    <link rel="preload" href="https://cdn.jsdelivr.net/gh/cmex-tw/iansui/webfont/iansui.css" as="style" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/cmex-tw/iansui/webfont/iansui.css" crossorigin="anonymous">
    <style>
        /* 強迫加載與解鎖 iOS 芫荽字型渲染 */
        @font-face {
            font-family: 'Iansui';
            src: url('https://cdn.jsdelivr.net/gh/cmex-tw/iansui/webfont/iansui.woff2') format('woff2'),
                 url('https://cdn.jsdelivr.net/gh/cmex-tw/iansui/webfont/iansui.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        body {
            font-family: 'Iansui', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--theme-bg);
            transition: background 0.5s ease-in-out;
        }
        :root {
            /* 預設為賽博紫主題 (Index 7) */
            --theme-bg: radial-gradient(circle at 50% 35%, #db2777 0%, #4c1d95 35%, #1e1b4b 75%, #05020c 100%);
            --theme-glow: 0 0 30px rgba(236, 72, 153, 0.9);
            --led-odd-color: rgb(6, 182, 212);
            --led-even-color: rgb(236, 72, 153);
            --frame-bg: linear-gradient(135deg, #4c1d95, #1e1b4b);
            --frame-border: rgba(236, 72, 153, 0.6);
            /* 卡片專屬底色與文字色 (賽博紫下底色隨動，字體強行鎖定高清晰皇家紫色) */
            --right-card-bg: #ecfeff;
            --right-card-text: #7e22ce;
            /* 卡片高度物理比例 */
            --item-h: clamp(140px, 38vh, 400px);
        }
        @media (max-width: 640px) {
            :root {
                --item-h: clamp(110px, 25vh, 200px);
            }
        }
        /* 霓虹與立體外框 */
        .neon-glow-frame {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.95), var(--theme-glow), inset 0 0 20px rgba(0, 0, 0, 0.45);
            background: var(--frame-bg);
            border: 4px solid var(--frame-border);
            transition: all 0.5s ease-in-out;
        }
        /* LED 燈珠交替閃爍 */
        .led-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            transition: background-color 0.3s ease;
        }
        /* 2D 物理滾動視窗 */
        .reel-viewport {
            height: var(--item-h);
            overflow: hidden;
            position: relative;
        }
        /* 垂直卡片滾軸 */
        .reel-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            transform: translateY(0);
        }
        /* 每張卡片的高度高度對齊視窗，flex-shrink 防止被壓縮 */
        .reel-card {
            height: var(--item-h);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-sizing: border-box;
            white-space: nowrap;
        }
        /* 卡片物理縮放字體 (微調加大，並兼顧長單詞不跑版) */
        .card-font-base {
            font-size: calc(var(--item-h) * 0.82);
            padding-bottom: 0.12em; /* 字母底邊偏置，保障下標符號不被切除 */
            line-height: 1;
        }
        .text-len-2 { font-size: calc(var(--item-h) * 0.72); }
        .text-len-3 { font-size: calc(var(--item-h) * 0.58); }
        .text-len-4 { font-size: calc(var(--item-h) * 0.46); }
        .text-len-large-vocab { font-size: calc(var(--item-h) * 0.30); } /* 大幅調大，原 0.24 */
        .text-len-huge-vocab { font-size: calc(var(--item-h) * 0.21); }  /* 大幅調大，原 0.16 */
        .text-welcome { font-size: calc(var(--item-h) * 0.24); }         /* 大幅調大，原 0.22 */
        
        /* 隱藏滾動條 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="w-full h-full select-none overflow-hidden flex flex-col justify-between text-white relative">

    <!-- 頂部標題區 (10vh 預算) -->

        <!-- 頂部右側功能膠囊 -->

                <button id="bgm-toggle-btn" class="px-3 py-1.5 rounded-full text-xs font-bold flex items-center gap-1.5 bg-slate-950/80 hover:bg-slate-900 text-slate-200 border border-pink-500/40 shadow-md transition duration-150">

                    <div class="font-bold text-pink-300 mb-1.5 pb-1 border-b border-white/10 px-1 flex justify-between items-center">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- 中部主拉霸區 (68vh 預算) -->
    <main class="h-[68vh] flex items-center justify-center px-4 relative z-20">
        <!-- 巨幕級拉霸機大外框 -->
        <div id="slot-machine-frame" class="w-[95vw] max-w-[800px] rounded-[2.5rem] p-4 sm:p-6 neon-glow-frame relative flex flex-col justify-between overflow-hidden">
            
            <!-- LED 裝飾燈條 (上方) -->
            <div class="absolute top-2 left-12 right-12 flex justify-between px-2" id="led-row-top"></div>
            <!-- LED 裝飾燈條 (下方) -->
            <div class="absolute bottom-2 left-12 right-12 flex justify-between px-2" id="led-row-bottom"></div>
            
            <!-- 單一滾筒居中排版 -->
            <div class="flex justify-center items-center my-auto relative w-full">
                <div class="relative overflow-hidden rounded-2xl sm:rounded-3xl border border-white/25 shadow-[inset_0_10px_30px_rgba(0,0,0,0.8),_0_8px_16px_rgba(0,0,0,0.5)] cursor-pointer active:scale-[0.98] transition-transform w-full max-w-[500px]" id="single-box" style="background-color: var(--right-card-bg); color: var(--right-card-text);">
                    <div class="reel-viewport w-full overflow-hidden relative">
                        <div id="single-reel" class="reel-container">
                            <!-- JS 動態插入 2D 滾動卡片 -->
                        </div>
                        <!-- 智慧型雙向漸變混色遮罩 -->
                        <div class="absolute inset-x-0 top-0 h-1/5 pointer-events-none z-10" style="background: linear-gradient(to bottom, var(--right-card-bg) 0%, rgba(255, 255, 255, 0) 100%);"></div>
                        <div class="absolute inset-x-0 bottom-0 h-1/5 pointer-events-none z-10" style="background: linear-gradient(to top, var(--right-card-bg) 0%, rgba(255, 255, 255, 0) 100%);"></div>
                    </div>
                </div>
            </div>
            
            <!-- 轉動時的滑鼠穿透防護罩 -->
            <div id="spin-shield" class="absolute inset-0 bg-transparent z-40 hidden"></div>
        </div>
    </main>

    <!-- 底部控制區與進度條 (22vh 預算) -->
    <footer class="h-[22vh] flex flex-col justify-between pb-8 px-4 sm:px-8 relative z-30 select-none">
        <div class="flex items-center justify-center space-x-2 sm:space-x-3 max-w-xl mx-auto w-full mb-1">
            <!-- 起轉按鈕 -->
            <button id="sync-spin-btn" class="flex-[1.8] py-2.5 sm:py-3 px-3 bg-gradient-to-r from-pink-400 via-purple-500 to-indigo-600 border border-white text-white hover:brightness-105 rounded-full text-xs sm:text-base font-black tracking-wider shadow-lg active:scale-95 transition-all text-center">Tńg--lo͘h!</button>
            
            <!-- 對照字表按鈕 -->
            <button id="chart-btn" class="flex-[1.2] py-2.5 sm:py-3 px-2 bg-white hover:bg-purple-50 border border-pink-400 text-purple-950 rounded-full text-[10px] sm:text-xs font-bold tracking-wider shadow-lg active:scale-95 transition-all flex items-center justify-center gap-0.5">📋 對照字表</button>
            
            <!-- 10 款背景主題選擇按鈕 -->
            <div class="relative">
                <button id="theme-toggle-btn" class="px-2.5 py-2 sm:px-3 sm:py-2.5 rounded-full text-[10px] sm:text-xs font-bold flex items-center gap-1 bg-slate-900/80 hover:bg-slate-800 text-slate-200 border border-pink-500/40 shadow-md transition duration-150">
                    🎨 主題

                <div id="theme-menu" class="absolute bottom-12 right-0 bg-slate-950/95 backdrop-blur-md border border-pink-500/40 rounded-2xl p-2 shadow-2xl hidden flex-col w-32 z-50 text-[10px] text-white">
                    <div class="font-bold text-amber-300 mb-1 px-1.5 py-1 border-b border-white/10 flex justify-between items-center">
                        <span>🎨 主題更換</span>
                        <button id="theme-menu-close" class="text-rose-400 font-bold">關</button>
                    </div>
                    <div class="flex flex-col space-y-0.5" id="theme-menu-list">
                        <!-- 由 JS 動態生成主題選單 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 20 個手動控題進度點 -->
        <div class="flex items-center justify-center space-x-1 sm:space-x-2 max-w-lg mx-auto w-full px-2" id="progress-dots-container"></div>
    </footer>

    <!-- 【對照字表全螢幕彈窗】(經過 90% 縮小設計) -->
    <div id="chart-overlay" class="fixed inset-0 bg-slate-950/95 backdrop-blur-md z-50 hidden flex-col p-6 sm:p-10 select-none overflow-y-auto">
        <div class="max-w-6xl mx-auto w-full flex flex-col h-full justify-between">
            <div>
                <!-- 頂部與極速關閉按鈕 -->
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl sm:text-4xl font-black text-pink-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.5)]">

                    </h2>
                    <button id="chart-close-btn" class="w-14 h-14 bg-rose-600 hover:bg-rose-500 text-white rounded-full font-black text-lg shadow-lg active:scale-90 flex items-center justify-center transition-all">

                </div>

                <!-- 結合韻動態列表卡片 -->
                <div id="chart-grid" class="flex flex-col space-y-6 overflow-y-auto max-h-[70vh] pr-2">
                    <!-- 由 JS 動態生成目前複母音卡片 -->
                </div>
            </div>
            
            <div class="text-center text-slate-500 text-xs mt-4">
                東港圖書館複母音結合韻對照版 • 點擊卡片可發出按鍵音
            </div>
        </div>
    </div>

    <!-- 【右上角客製化自訂教材編輯彈窗】 -->
    <div id="settings-overlay" class="fixed inset-0 bg-slate-950/95 backdrop-blur-lg z-50 hidden flex-col justify-center items-center p-4">
        <div class="bg-slate-900 border border-pink-500/40 rounded-3xl p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative">
            <h2 class="text-xl sm:text-2xl font-black text-center text-pink-300 drop-shadow-[0_0_10px_rgba(236,72,153,0.5)] mb-4 flex items-center justify-center gap-1">
                ⚙️ 編輯結合韻教材

                <label class="block text-pink-300 text-sm font-bold mb-2">複母音教材內容</label>
                <p class="text-[10px] text-slate-400 mb-2">請直接在獨立輸入框內修改或刪除，可支援最多 18 個結合韻：</p>
                <div id="custom-words-inputs" class="grid grid-cols-3 sm:grid-cols-4 gap-2"></div>
            </div>

            <!-- 自訂教材編輯器功能控制按鈕 -->
            <div class="flex justify-end space-x-3">
                <button id="settings-reset-btn" class="px-5 py-2 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-full font-bold text-sm transition-all active:scale-95">
                    重設為預設值

                <button id="settings-cancel-btn" class="px-5 py-2 bg-rose-950 hover:bg-rose-900 text-rose-300 rounded-full font-bold text-sm transition-all active:scale-95">
                    取消

                <button id="settings-save-btn" class="px-6 py-2 bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-full font-bold text-sm shadow-md transition-all active:scale-95">
                    儲存並重啟遊戲
                </button>
            </div>
        </div>
    </div>

    <!-- 輕量型自訂提示橫幅 (Toast) 替代原生 alert -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 -translate-y-20 bg-slate-900/95 text-pink-300 border border-pink-500/50 px-6 py-3 rounded-full text-xs sm:text-sm font-bold shadow-2xl z-[100] transition-all duration-300 opacity-0 pointer-events-none flex items-center gap-2">
        <span class="animate-bounce">💡</span> <span id="toast-msg"></span>
    </div>

    <!-- 核心運作邏輯 JavaScript -->
    <script>
        /* 【預設結合韻(複母音)教材庫】 */
        const DEFAULT_WORDS = ['hang-bah', 'hiuⁿ-ko͘', 'tāi-tông-á', 'chheⁿ-hoe-chhài', 'lĭn-jín', 'chhang-á'];

        /* 10組大對比、主題外框與【單欄專屬配色】 (預設為賽博紫 Index 7) */
        const THEMES = [
            { 
                bg: 'radial-gradient(circle at 50% 35%, #0891b2 0%, #0f172a 40%, #020617 80%, #000000 100%)', 
                glow: '0 0 25px rgba(6, 182, 212, 0.8)', 
                ledOdd: 'rgb(6, 182, 212)', 
                ledEven: 'rgb(16, 185, 129)', 
                frameBg: 'linear-gradient(135deg, #0f172a, #020617)', 
                frameBorder: 'rgba(6, 182, 212, 0.5)',
                cardBg: '#f0fdf4'
            }, // 極光藍
            { 
                bg: 'radial-gradient(circle at 50% 35%, #059669 0%, #065f46 35%, #064e3b 70%, #022c22 100%)', 
                glow: '0 0 25px rgba(16, 185, 129, 0.8)', 
                ledOdd: 'rgb(16, 185, 129)', 
                ledEven: 'rgb(245, 158, 11)', 
                frameBg: 'linear-gradient(135deg, #064e3b, #022c22)', 
                frameBorder: 'rgba(16, 185, 129, 0.5)',
                cardBg: '#fffbeb'
            }, // 帝王綠
            { 
                bg: 'radial-gradient(circle at 50% 35%, #7e22ce 0%, #581c87 35%, #3b0764 70%, #090514 100%)', 
                glow: '0 0 25px rgba(168, 85, 247, 0.8)', 
                ledOdd: 'rgb(168, 85, 247)', 
                ledEven: 'rgb(236, 72, 153)', 
                frameBg: 'linear-gradient(135deg, #581c87, #3b0764)', 
                frameBorder: 'rgba(168, 85, 247, 0.6)',
                cardBg: '#fff1f2'
            }, // 紫羅蘭
            { 
                bg: 'radial-gradient(circle at 50% 35%, #be123c 0%, #881337 35%, #4c0519 70%, #270006 100%)', 
                glow: '0 0 25px rgba(244, 63, 94, 0.8)', 
                ledOdd: 'rgb(244, 63, 94)', 
                ledEven: 'rgb(251, 191, 36)', 
                frameBg: 'linear-gradient(135deg, #4c0519, #270006)', 
                frameBorder: 'rgba(244, 63, 94, 0.5)',
                cardBg: '#fffbeb'
            }, // 玫瑰紅
            { 
                bg: 'radial-gradient(circle at 50% 35%, #fb923c 0%, #f97316 40%, #ea580c 75%, #7c2d12 100%)', 
                glow: '0 0 25px rgba(249, 115, 22, 0.95)', 
                ledOdd: 'rgb(249, 115, 22)', 
                ledEven: 'rgb(234, 179, 8)', 
                frameBg: 'linear-gradient(135deg, #ea580c, #7c2d12)', 
                frameBorder: 'rgba(249, 115, 22, 0.6)',
                cardBg: '#fefce8'
            }, // 活力橘
            { 
                bg: 'radial-gradient(circle at 50% 35%, #60a5fa 0%, #a78bfa 40%, #ec4899 75%, #3b0764 100%)', 
                glow: '0 0 30px rgba(236, 72, 153, 0.9)', 
                ledOdd: 'rgb(6, 182, 212)', 
                ledEven: 'rgb(236, 72, 153)', 
                frameBg: 'linear-gradient(135deg, #a78bfa, #ec4899)', 
                frameBorder: 'rgba(236, 72, 153, 0.5)',
                cardBg: '#fdf2f8'
            }, // 糖果粉
            { 
                bg: 'radial-gradient(circle at 50% 35%, #a3e635 0%, #84cc16 35%, #15803d 75%, #064e3b 100%)', 
                glow: '0 0 25px rgba(132, 204, 22, 0.9)', 
                ledOdd: 'rgb(132, 204, 22)', 
                ledEven: 'rgb(6, 182, 212)', 
                frameBg: 'linear-gradient(135deg, #15803d, #064e3b)', 
                frameBorder: 'rgba(132, 204, 22, 0.5)',
                cardBg: '#ecfeff'
            }, // 萊姆綠
            { 
                bg: 'radial-gradient(circle at 50% 35%, #db2777 0%, #4c1d95 35%, #1e1b4b 75%, #05020c 100%)', 
                glow: '0 0 30px rgba(236, 72, 153, 0.9)', 
                ledOdd: 'rgb(6, 182, 212)', 
                ledEven: 'rgb(236, 72, 153)', 
                frameBg: 'linear-gradient(135deg, #4c1d95, #1e1b4b)', 
                frameBorder: 'rgba(236, 72, 153, 0.6)',
                cardBg: '#ecfeff'
            }, // 賽博紫 (預設)
            { 
                bg: 'radial-gradient(circle at 50% 35%, #f59e0b 0%, #d97706 35%, #92400e 70%, #78350f 100%)', 
                glow: '0 0 25px rgba(245, 158, 11, 0.8)', 
                ledOdd: 'rgb(249, 115, 22)', 
                ledEven: 'rgb(234, 179, 8)', 
                frameBg: 'linear-gradient(135deg, #92400e, #78350f)', 
                frameBorder: 'rgba(245, 158, 11, 0.5)',
                cardBg: '#fffbeb'
            }, // 璀璨金
            { 
                bg: 'radial-gradient(circle at 50% 35%, #f472b6 0%, #db2777 35%, #831843 70%, #4c0519 100%)', 
                glow: '0 0 25px rgba(244, 114, 182, 0.8)', 
                ledOdd: 'rgb(244, 114, 182)', 
                ledEven: 'rgb(255, 255, 255)', 
                frameBg: 'linear-gradient(135deg, #db2777, #831843)', 
                frameBorder: 'rgba(244, 114, 182, 0.5)',
                cardBg: '#f8fafc'
            }  // 櫻花粉
        ];

        /* 自訂會話儲存金鑰 (獨立為 slot_single_words_cyber_v1 以隔離璀璨金版) */
        let words = JSON.parse(sessionStorage.getItem('slot_single_words_cyber_v1')) || DEFAULT_WORDS;
        
        let selectedThemeIdx = parseInt(sessionStorage.getItem('selected_theme_idx_cyber_v1')) || 7; // 預設為賽博紫 (Index 7)

        function applyTheme(idx) {
            selectedThemeIdx = idx;
            sessionStorage.setItem('selected_theme_idx_cyber_v1', idx);
            const t = THEMES[idx];
            document.documentElement.style.setProperty('--theme-bg', t.bg);
            document.documentElement.style.setProperty('--theme-glow', t.glow);
            document.documentElement.style.setProperty('--led-odd-color', t.ledOdd);
            document.documentElement.style.setProperty('--led-even-color', t.ledEven);
            document.documentElement.style.setProperty('--frame-bg', t.frameBg);
            document.documentElement.style.setProperty('--frame-border', t.frameBorder);
            // 統一卡片底色隨動，文字顏色強行鎖定高清晰皇家紫色 (#7e22ce)
            document.documentElement.style.setProperty('--right-card-bg', t.cardBg);
            document.documentElement.style.setProperty('--right-card-text', '#7e22ce');
        }

        /* 10組 Web Audio API 音樂數據 */
        const TRACKS = [
            { name: "⚡ 電玩極速衝刺", tempo: 150, type: 'square', notes: [523, 659, 587, 659, 523, 784, 698, 784], vol: 0.12 },
            { name: "⚔️ 勇者衝鋒號", tempo: 300, type: 'sawtooth', notes: [261, 392, 523, 392, 329, 392, 523, 659], vol: 0.08 },
            { name: "🎪 歡樂嘉年華", tempo: 200, type: 'triangle', notes: [392, 494, 587, 494, 523, 659, 784, 523], vol: 0.15 },
            { name: "🏃 神速手指賽", tempo: 120, type: 'square', notes: [587, 698, 587, 784, 587, 880, 784, 698], vol: 0.10 },
            { name: "🚨 驚險倒數計時", tempo: 250, type: 'sawtooth', notes: [196, 220, 246, 220, 196, 220, 246, 293], vol: 0.08 },
            { name: "🏆 黃金冠軍賽", tempo: 280, type: 'triangle', notes: [261, 329, 392, 523, 440, 523, 587, 784], vol: 0.15 },
            { name: "🤡 瘋狂馬戲團", tempo: 180, type: 'square', notes: [523, 261, 587, 293, 659, 329, 587, 293], vol: 0.10 },
            { name: "🔥 極限對抗賽", tempo: 180, type: 'sawtooth', notes: [220, 330, 293, 330, 440, 330, 392, 330], vol: 0.08 }, // 預設音樂 (Index 7)
            { name: "🛸 太空大冒險", tempo: 240, type: 'sine', notes: [523, 1046, 587, 1174, 659, 1318, 523, 1046], vol: 0.15 },
            { name: "🏁 終極大對決", tempo: 140, type: 'sawtooth', notes: [440, 440, 523, 440, 587, 523, 698, 587], vol: 0.08 }
        ];

        /* 【音樂預設調整】預設為第八軌：🔥 極限對抗賽 (Index 7)，且預設開啟 (isBgmOn = true) */
        let audioCtx = null, isBgmOn = true, bgmIntervalId = null, currentTrackIndex = 7;
        let currentCycleState = 'welcome', totalQuestionsCount = 20, currentQuestion = 0;

        // 當前卡片顯示字
        let currentShowing = "Chún-pī";

        const singleReel = document.getElementById('single-reel');
        const singleBox = document.getElementById('single-box');
        const syncSpinBtn = document.getElementById('sync-spin-btn'), chartBtn = document.getElementById('chart-btn');
        const themeToggleBtn = document.getElementById('theme-toggle-btn'), themeMenu = document.getElementById('theme-menu');
        const themeMenuClose = document.getElementById('theme-menu-close');
        const bgmToggleBtn = document.getElementById('bgm-toggle-btn'), bgmMenu = document.getElementById('bgm-menu');
        const bgmMenuClose = document.getElementById('bgm-menu-close');
        const gearBtn = document.getElementById('gear-btn'), settingsOverlay = document.getElementById('settings-overlay');
        const spinShield = document.getElementById('spin-shield');

        // 客製化提示橫幅代替瀏覽器原生 alert
        function showToast(msg) {
            const toast = document.getElementById('toast'), toastMsg = document.getElementById('toast-msg');
            toastMsg.innerText = msg;
            toast.classList.remove('-translate-y-20', 'opacity-0', 'pointer-events-none');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('-translate-y-20', 'opacity-0', 'pointer-events-none');
            }, 3000);
        }

        /* 安全解鎖並智慧播放預設 BGM */
        function initAudio() { 
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
            if (audioCtx.state === 'suspended') audioCtx.resume(); 
            if (isBgmOn && currentTrackIndex !== -1 && !bgmIntervalId) {
                runBgmLoop();
            }
        }
        
        let activeBgmOscillators = [];

        // 瞬間停止並切斷所有正在發聲的背景音符 (零延遲音訊即時切斷機制)
        function stopAllBgmOscillators() {
            activeBgmOscillators.forEach(osc => {
                try { osc.stop(); } catch(e) {}
            });
            activeBgmOscillators = [];
        }

        // 大聲嘹亮版音效合成引擎 (適用大教室擴音)
        function playSynthesizedSound(type) {
            try {
                initAudio();
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);

                if (type === 'tick') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(650, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.03);
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime); 
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.03);
                } else if (type === 'chord') {
                    const now = audioCtx.currentTime;
                    const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5 大三和弦
                    notes.forEach((freq, idx) => {
                        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                        o.connect(g); g.connect(audioCtx.destination);
                        o.type = 'triangle'; o.frequency.setValueAtTime(freq, now + idx * 0.08);
                        g.gain.setValueAtTime(0.25, now + idx * 0.08); 
                        g.gain.exponentialRampToValueAtTime(0.001, now + idx * 0.08 + 0.4);
                        o.start(now + idx * 0.08); o.stop(now + idx * 0.08 + 0.4);
                    });
                }
            } catch(e) {}
        }

        /* 雙聲部動態熱鬧闖關音樂合成循環器 */
        function runBgmLoop() {
            if (bgmIntervalId) clearInterval(bgmIntervalId);
            stopAllBgmOscillators(); // 確保開始新音樂前，舊音樂的音尾被立刻切斷
            if (currentTrackIndex === -1 || !isBgmOn) return;
            
            const track = TRACKS[currentTrackIndex];
            let noteIdx = 0;
            
            bgmIntervalId = setInterval(() => {
                if (!isBgmOn || !audioCtx || audioCtx.state === 'suspended') return;
                try {
                    const now = audioCtx.currentTime;
                    const freq = track.notes[noteIdx];
                    
                    const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                    osc.connect(gain); gain.connect(audioCtx.destination);
                    osc.type = track.type;
                    osc.frequency.setValueAtTime(freq, now);
                    
                    gain.gain.setValueAtTime(track.vol, now);
                    gain.gain.exponentialRampToValueAtTime(0.001, now + (track.tempo / 1000) * 0.9);
                    osc.start(now); osc.stop(now + (track.tempo / 1000) * 0.9);
                    activeBgmOscillators.push(osc);

                    if (track.type === 'square' || track.type === 'sawtooth') {
                        const subOsc = audioCtx.createOscillator(), subGain = audioCtx.createGain();
                        subOsc.connect(subGain); subGain.connect(audioCtx.destination);
                        subOsc.type = 'triangle';
                        subOsc.frequency.setValueAtTime(freq / 2, now); 
                        
                        subGain.gain.setValueAtTime(track.vol * 0.6, now);
                        subGain.gain.exponentialRampToValueAtTime(0.001, now + (track.tempo / 1000) * 0.9);
                        subOsc.start(now); subOsc.stop(now + (track.tempo / 1000) * 0.9);
                        activeBgmOscillators.push(subOsc);
                    }
                    
                    // 定期釋放已結束的播放源，避免陣列無限膨脹
                    if (activeBgmOscillators.length > 30) {
                        activeBgmOscillators = activeBgmOscillators.slice(-10);
                    }
                    
                    noteIdx = (noteIdx + 1) % track.notes.length;
                } catch(e) {}
            }, track.tempo);
        }

        // 動態生成 LED 點狀裝飾燈條
        function buildLeds() {
            const rowTop = document.getElementById('led-row-top'), rowBottom = document.getElementById('led-row-bottom');
            rowTop.innerHTML = ''; rowBottom.innerHTML = '';
            const count = window.innerWidth < 640 ? 6 : 14;
            for (let i = 0; i < count; i++) {
                const dot1 = document.createElement('div'), dot2 = document.createElement('div');
                dot1.className = 'led-dot shadow-md'; dot2.className = 'led-dot shadow-md';
                rowTop.appendChild(dot1); rowBottom.appendChild(dot2);
            }
        }
        
        let ledTick = 0;
        setInterval(() => {
            const dots = document.querySelectorAll('.led-dot');
            const theme = THEMES[selectedThemeIdx];
            dots.forEach((dot, idx) => {
                if ((idx + ledTick) % 2 === 0) {
                    dot.style.backgroundColor = theme.ledOdd;
                    dot.style.boxShadow = `0 0 10px ${theme.ledOdd}`;
                } else {
                    dot.style.backgroundColor = theme.ledEven;
                    dot.style.boxShadow = `0 0 10px ${theme.ledEven}`;
                }
            });
            ledTick++;
        }, 300);

        /* 【巨幕字體與底邊偏置智慧適配】 (優化長字串) */
        function getFitClass(txt) {
            const cleaned = txt.replace(/[ⁿ̍͘]/g, '');
            if (cleaned.length === 1) return 'card-font-base';
            if (cleaned.length === 2) return 'card-font-base text-len-2';
            if (cleaned.length === 3) return 'card-font-base text-len-3';
            if (cleaned.length <= 6) return 'card-font-base text-len-4';
            if (cleaned.length <= 10) return 'card-font-base text-len-large-vocab';
            return 'card-font-base text-len-huge-vocab';
        }

        // 【靜態設置/重置滾筒】一鍵設定至單一卡片
        function buildReelStatic(element, word) {
            element.style.transition = 'none';
            element.style.transform = 'translateY(0)';
            element.innerHTML = '';

            const card = document.createElement('div');
            let fitCls = (currentCycleState === 'welcome' || currentCycleState === 'over') 
                ? 'text-welcome font-black pb-[0.1em]' 
                : getFitClass(word);
            card.className = `reel-card font-black select-none transition-all ${fitCls}`;
            card.innerText = word;
            element.appendChild(card);
        }

        // 渲染底部 20 個空心/實心進度點
        function buildProgressDots() {
            const container = document.getElementById('progress-dots-container');
            container.innerHTML = '';
            for (let i = 0; i < totalQuestionsCount; i++) {
                const dot = document.createElement('div');
                if (i < currentQuestion) {
                    dot.className = 'w-3 h-3 rounded-full bg-pink-400 shadow-[0_0_8px_rgba(236,72,153,1)] transition-all duration-300';
                } else {
                    dot.className = 'w-3 h-3 rounded-full border border-white/40 bg-white/10 transition-all duration-300';
                }
                container.appendChild(dot);
            }
        }

        let isSpinning = false;

        // 隨著卡片滾動速度逐步遞減的「擬真敲擊音效」
        function playDeceleratingTicks(totalTicks, duration) {
            let currentTick = 0;
            function nextTick() {
                if (currentTick >= totalTicks) return;
                playSynthesizedSound('tick');
                currentTick++;
                const progress = currentTick / totalTicks;
                const nextInterval = 30 + Math.pow(progress, 3) * 250; 
                setTimeout(nextTick, nextInterval);
            }
            nextTick();
        }

        // 【單欄位起轉主核心（100% 穩健 2D 物理百分比）】
        function spinAll() {
            if (isSpinning) return;
            initAudio();
            isSpinning = true;
            spinShield.classList.remove('hidden');

            if (currentCycleState === 'welcome' || currentCycleState === 'over') {
                currentCycleState = 'spinning';
                if (currentCycleState === 'over') currentQuestion = 0;
            }

            const targetWord = words[Math.floor(Math.random() * words.length)];

            const totalCards = 25;
            const cardList = [currentShowing];

            for (let i = 1; i < totalCards - 1; i++) {
                cardList.push(words[Math.floor(Math.random() * words.length)]);
            }
            cardList.push(targetWord);

            // 渲染卡片
            singleReel.innerHTML = '';
            cardList.forEach(word => {
                const card = document.createElement('div');
                card.className = `reel-card font-black select-none transition-all ${getFitClass(word)}`;
                card.innerText = word;
                singleReel.appendChild(card);
            });

            singleReel.style.transition = 'none';
            singleReel.style.transform = 'translateY(0)';
            singleReel.offsetHeight; // Reflow

            playDeceleratingTicks(18, 1500);

            singleReel.style.transition = 'transform 1.5s cubic-bezier(0.15, 0.85, 0.3, 1)';
            singleReel.style.transform = `translateY(-${((totalCards - 1) / totalCards) * 100}%)`;

            setTimeout(() => {
                isSpinning = false;
                spinShield.classList.add('hidden');
                currentCycleState = 'celebrated';

                currentShowing = targetWord;
            }, 1500);
        }

        // 【慶祝灑花與評分】
        function celebrateScore() {
            currentQuestion++;
            buildProgressDots();
            playSynthesizedSound('chord');

            try {
                confetti({ particleCount: 80, spread: 60, origin: { x: 0.1, y: 0.85 } });
                confetti({ particleCount: 80, spread: 60, origin: { x: 0.9, y: 0.85 } });
            } catch(e) {}

            if (currentQuestion >= totalQuestionsCount) {
                setTimeout(() => {
                    currentCycleState = 'over';
                    currentShowing = "Oân-sêng!";
                    buildReelStatic(singleReel, currentShowing);
                    try {
                        confetti({ particleCount: 300, spread: 180, origin: { x: 0.5, y: 0.5 } });
                    } catch(e) {}
                    showToast("🎉 Oân-sêng! 恭喜完成結合韻練習！🏆");
                }, 1000);
            } else {
                currentCycleState = 'nextQuest';
            }
        }

        // 簡報遙控/點擊觸發判定 (簡化為全域單轉流程)
        function processTriggerInput(e) {
            if (e && e.target && (e.target.closest('button') || e.target.closest('#settings-overlay') || e.target.closest('#chart-overlay') || e.target.closest('input'))) {
                return;
            }
            initAudio();
            if (isSpinning) return;

            if (currentCycleState === 'welcome' || currentCycleState === 'nextQuest' || currentCycleState === 'over') {
                spinAll();
            } else if (currentCycleState === 'celebrated') {
                celebrateScore();
            }
        }

        document.body.addEventListener('click', processTriggerInput);
        
        document.addEventListener('keydown', (e) => {
            if (settingsOverlay.classList.contains('hidden') && document.getElementById('chart-overlay').classList.contains('hidden')) {
                const keys = ['Space', ' ', 'Enter', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'PageUp', 'PageDown'];
                if (keys.includes(e.key)) {
                    e.preventDefault();
                    processTriggerInput(null);
                }
            }
        });

        // 點擊卡片方格亦起轉
        singleBox.addEventListener('click', (e) => {
            e.stopPropagation();
            initAudio();
            if (isSpinning) return;
            if (currentCycleState === 'welcome' || currentCycleState === 'nextQuest' || currentCycleState === 'over') {
                spinAll();
            } else if (currentCycleState === 'celebrated') {
                celebrateScore();
            }
        });

        /* 【📋 全螢幕結合韻對照字表動態生成】 */
        function generateChartTable() {
            const grid = document.getElementById('chart-grid');
            grid.innerHTML = '';

            const section = document.createElement('div');
            section.className = "bg-slate-900/80 border border-pink-500/20 rounded-3xl p-4 sm:p-6 mb-4";
            
            const title = document.createElement('h3');
            title.className = "text-xl sm:text-2xl font-black text-pink-300 mb-4 pb-2 border-b border-white/10 flex items-center gap-1.5";
            title.innerHTML = `<span class="text-xs px-2.5 py-0.5 rounded-full bg-pink-400 text-slate-950 font-black">對照字詞</span>`;
            section.appendChild(title);

            const cardsWrap = document.createElement('div');
            cardsWrap.className = "grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3";

            words.forEach(word => {
                const card = document.createElement('div');
                card.className = "min-h-[100px] bg-slate-950 hover:bg-pink-950 text-white rounded-2xl flex flex-col justify-center items-center shadow-lg hover:scale-105 active:scale-95 transition-all border border-white/10 p-3 cursor-pointer whitespace-nowrap overflow-hidden";
                
                const textSpan = document.createElement('span');
                textSpan.className = "text-xl sm:text-2xl font-black text-purple-300 whitespace-nowrap leading-none mb-1.5 tracking-wider";
                textSpan.innerText = word;
                
                const subSpan = document.createElement('span');
                subSpan.className = "text-[10px] text-pink-400 tracking-widest font-bold";
                subSpan.innerText = `白話字`;

                card.appendChild(textSpan);
                card.appendChild(subSpan);

                card.addEventListener('click', (e) => {
                    e.stopPropagation();
                    playSynthesizedSound('tick');
                });
                cardsWrap.appendChild(card);
            });

            section.appendChild(cardsWrap);
            grid.appendChild(section);
        }

        chartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            generateChartTable();
            document.getElementById('chart-overlay').classList.remove('hidden');
        });
        document.getElementById('chart-close-btn').addEventListener('click', () => {
            document.getElementById('chart-overlay').classList.add('hidden');
        });

        /* 【⚙️ 右上角自訂教材編輯彈窗】 */
        function openSettings() {
            const container = document.getElementById('custom-words-inputs');
            container.innerHTML = '';

            for (let i = 0; i < 18; i++) {
                const val = words[i] || "";
                const input = document.createElement('input');

                input.className = "w-full py-1.5 px-2 bg-slate-950 border border-pink-500/30 rounded-lg text-xs sm:text-sm font-bold text-pink-300 text-center outline-none focus:border-pink-400 transition-all";
                container.appendChild(input);
            }
            settingsOverlay.classList.remove('hidden');
        }

        gearBtn.addEventListener('click', (e) => {
            e.stopPropagation(); openSettings();
        });
        document.getElementById('settings-cancel-btn').addEventListener('click', () => {
            settingsOverlay.classList.add('hidden');
        });

        document.getElementById('settings-save-btn').addEventListener('click', () => {
            const inputs = document.querySelectorAll('#custom-words-inputs input');
            const newWords = Array.from(inputs).map(inp => inp.value.trim()).filter(val => val !== "");

            if (newWords.length === 0) {
                showToast("⚠️ 教材內容不得設定為空！");
                return;
            }

            words = newWords;
            sessionStorage.setItem('slot_single_words_cyber_v1', JSON.stringify(newWords));

            settingsOverlay.classList.add('hidden');
            currentCycleState = 'welcome';
            currentQuestion = 0;
            
            buildProgressDots();
            currentShowing = "Chún-pī";
            buildReelStatic(singleReel, currentShowing);
            showToast("💾 教材設定儲存成功！洗牌重置遊戲。");
        });

        document.getElementById('settings-reset-btn').addEventListener('click', () => {
            sessionStorage.removeItem('slot_single_words_cyber_v1');
            words = DEFAULT_WORDS;
            openSettings();
            showToast("🔄 已成功還原為預設教材！");

        themeToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            themeMenu.classList.toggle('hidden');
            bgmMenu.classList.add('hidden');
        });
        themeMenuClose.addEventListener('click', (e) => {
            e.stopPropagation(); themeMenu.classList.add('hidden');
        });

        bgmToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            bgmMenu.classList.toggle('hidden');
            themeMenu.classList.add('hidden');
        });
        document.getElementById('bgm-menu-close').addEventListener('click', (e) => {
            e.stopPropagation(); bgmMenu.classList.add('hidden');
        });

        function buildThemeMenuList() {
            const listContainer = document.getElementById('theme-menu-list');
            listContainer.innerHTML = '';
            
            const themeNames = ["極光藍", "帝王綠", "紫羅蘭", "玫瑰紅", "活力橘", "糖果粉", "萊姆綠", "賽博紫", "璀璨金", "櫻花粉"];
            const dotColors = ["bg-cyan-400", "bg-emerald-400", "bg-purple-500", "bg-rose-500", "bg-orange-500", "bg-pink-400", "bg-lime-400", "bg-indigo-500", "bg-yellow-500", "bg-rose-300"];
            
            themeNames.forEach((name, idx) => {
                const btn = document.createElement('button');
                btn.className = "theme-menu-item text-left px-1.5 py-1 hover:bg-white/10 rounded flex items-center gap-1 transition-all " + (idx === selectedThemeIdx ? "bg-white/10 text-pink-300" : "");
                btn.innerHTML = `<span class="w-2 h-2 rounded-full ${dotColors[idx]}"></span>${name}`;
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    applyTheme(idx);
                    themeMenu.classList.add('hidden');
                    buildThemeMenuList();
                    buildReelStatic(singleReel, currentShowing);
                    showToast(`🎨 成功切換為主題：${name}`);
                });
                listContainer.appendChild(btn);
            });
        }

        function buildBgmList() {
            const listContainer = document.getElementById('bgm-list-container');
            listContainer.innerHTML = '';

            const offBtn = document.createElement('button');
            offBtn.className = "text-left px-2 py-1.5 rounded flex items-center justify-between transition-all " + (currentTrackIndex === -1 ? "bg-white/10 text-rose-400 font-black" : "hover:bg-white/5 text-slate-300");
            offBtn.innerHTML = `<span>🎵 關閉音樂</span>` + (currentTrackIndex === -1 ? `<span>●</span>` : "");
            offBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isBgmOn = false; currentTrackIndex = -1;
                clearInterval(bgmIntervalId); bgmIntervalId = null;
                stopAllBgmOscillators(); 
                document.getElementById('bgm-indicator').className = "w-1.5 h-1.5 rounded-full bg-slate-500";
                document.getElementById('bgm-text').innerText = "🎵 音樂 OFF";
                bgmMenu.classList.add('hidden');
                buildBgmList();
            });
            listContainer.appendChild(offBtn);

            TRACKS.forEach((track, idx) => {
                const btn = document.createElement('button');
                btn.className = "text-left px-2 py-1.5 rounded flex items-center justify-between transition-all " + (idx === currentTrackIndex ? "bg-white/10 text-pink-300 font-black" : "hover:bg-white/5 text-slate-300");
                btn.innerHTML = `<span>🎶 ${track.name}</span>` + (idx === currentTrackIndex ? `<span>●</span>` : "");
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    isBgmOn = true; currentTrackIndex = idx;
                    document.getElementById('bgm-indicator').className = "w-1.5 h-1.5 rounded-full bg-green-400 animate-ping";
                    document.getElementById('bgm-text').innerText = `🎶 ${track.name.split(' ')[1]}`; 
                    bgmMenu.classList.add('hidden');
                    stopAllBgmOscillators(); 
                    runBgmLoop();
                    buildBgmList();
                });
                listContainer.appendChild(btn);
            });
        }

        syncSpinBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            initAudio();
            if (isSpinning) return;
            if (currentCycleState === 'welcome' || currentCycleState === 'nextQuest' || currentCycleState === 'over') {
                spinAll();
            } else if (currentCycleState === 'celebrated') {
                celebrateScore();
            }
        });

        window.addEventListener('click', () => {
            themeMenu.classList.add('hidden');
            bgmMenu.classList.add('hidden');
        });

        window.addEventListener('resize', () => {
            buildLeds();
            buildReelStatic(singleReel, currentShowing);
        });

        /* 視窗載入，自適應拉起 */
        window.onload = function() {
            applyTheme(selectedThemeIdx);
            buildLeds();
            buildProgressDots();
            buildBgmList();
            buildThemeMenuList();
            buildReelStatic(singleReel, currentShowing);
        };
    </script>
</body>
</html>
