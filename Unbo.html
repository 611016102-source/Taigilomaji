<!DOCTYPE html>
<html lang="zh-Hant" class="w-screen h-screen overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台語羅馬字雙欄拉霸機 (春櫻落雪粉版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Loading the special Iansui Taiwanese Font for perfect tone marks */
        @import url('https://cdn.jsdelivr.net/gh/cmex-tw/iansui/webfont/iansui.css');
        
        :root {
            /* Responsive vertical heights mapped to the viewport strictly */
            --item-h: clamp(140px, 38vh, 400px);
            --scale-1: 0.76;
            --scale-2: 0.63;
            --scale-3: 0.50;
            --scale-4: 0.40;
            --scale-welcome: 0.24;
        }

        @media (max-width: 640px) {
            :root {
                --item-h: clamp(110px, 25vh, 200px);
                --scale-1: 0.68;
                --scale-2: 0.56;
                --scale-3: 0.45;
                --scale-4: 0.36;
                --scale-welcome: 0.20;
            }
        }

        body {
            font-family: 'Iansui', sans-serif;
            /* Premium Sakura Blossom theme: fading from bright pink to deep burgundy */
            background: radial-gradient(circle at 50% 35%, #f472b6 0%, #db2777 35%, #831843 70%, #4c0519 100%);
            user-select: none;
            -webkit-user-select: none;
        }

        /* Prevent text-clipping with low-descending characters (p, j, g, ⁿ, o͘) */
        .prevent-clip {
            padding-bottom: 0.12em;
        }

        /* Glowing Sakura Pink outer border shadow */
        .sakura-glow {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.95), 0 0 25px rgba(244, 114, 182, 0.85), inset 0 0 20px rgba(0, 0, 0, 0.4);
        }

        /* Dual-color LED flashing animations */
        @keyframes led-blink-odd {
            0%, 100% { opacity: 1; transform: scale(1.1); }
            50% { opacity: 0.35; transform: scale(0.9); }
        }
        @keyframes led-blink-even {
            0%, 100% { opacity: 0.35; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        .led-odd {
            animation: led-blink-odd 1.2s infinite;
        }
        .led-even {
            animation: led-blink-even 1.2s infinite;
        }

        /* Slot Reel motion smoothing */
        .slot-reel {
            transition: transform 1.5s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        /* Bypassing animations during fast resets */
        .slot-reel-instant {
            transition: none !important;
        }

        /* Dynamic physical scaling rules for font size bounds */
        .text-len-1 { font-size: calc(var(--item-h) * var(--scale-1)); line-height: 1; }
        .text-len-2 { font-size: calc(var(--item-h) * var(--scale-2)); line-height: 1; }
        .text-len-3 { font-size: calc(var(--item-h) * var(--scale-3)); line-height: 1; }
        .text-len-4 { font-size: calc(var(--item-h) * var(--scale-4)); line-height: 1; }
        .text-welcome { font-size: calc(var(--item-h) * var(--scale-welcome)); line-height: 1.1; }

        /* Custom elegant scrollbar styling for settings menu */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(244, 114, 182, 0.5);
            border-radius: 999px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(244, 114, 182, 0.8);
        }
    </style>
</head>

    <script>
        // Core dataset values initialized with requested defaults (from second request)
        const DEFAULT_LEFT = ['p', 'ph', 'm', 'b', 't', 'th', 'n', 'l', 'k', 'kh', 'h', 'g', 'ng', 'ch', 'chh', 's', 'j'];
        const DEFAULT_RIGHT = ['a', 'i', 'u', 'o͘', 'e', 'o'];

        // Storage load variables
        let leftWords = JSON.parse(localStorage.getItem('slot_left_words_sakura')) || DEFAULT_LEFT;
        let rightWords = JSON.parse(localStorage.getItem('slot_right_words_sakura')) || DEFAULT_RIGHT;

        // Synth sound manager variables
        let audioCtx = null;
        let isBgmOn = false;
        let bgmIntervalId = null;

        // Cycle state metrics
        let currentCycleState = 'welcome'; 
        let totalQuestionsCount = 20;
        let currentQuestion = 0; 

        let currentLeftTargetIdx = 0;
        let currentRightTargetIdx = 0;

        // Primary DOM nodes
        const leftReel = document.getElementById('left-reel');
        const rightReel = document.getElementById('right-reel');
        const leftShield = document.getElementById('left-shield');
        const rightShield = document.getElementById('right-shield');
        const progressContainer = document.getElementById('progress-container');

        const bgmToggleBtn = document.getElementById('bgm-toggle-btn');
        const bgmIndicator = document.getElementById('bgm-indicator');
        const bgmText = document.getElementById('bgm-text');

        const gearBtn = document.getElementById('gear-btn');
        const settingsOverlay = document.getElementById('settings-overlay');
        const cancelSettingsBtn = document.getElementById('cancel-settings-btn');
        const saveSettingsBtn = document.getElementById('save-settings-btn');
        const settingsInputsContainer = document.getElementById('settings-inputs-container');

        const chartBtn = document.getElementById('chart-btn');
        const chartOverlay = document.getElementById('chart-overlay');
        const closeChartBtn = document.getElementById('close-chart-btn');
        const gridSia = document.getElementById('grid-sia');
        const gridPhi = document.getElementById('grid-phi');

        const syncSpinBtn = document.getElementById('sync-spin-btn');
        const completionOverlay = document.getElementById('completion-overlay');
        const resetGameBtn = document.getElementById('reset-game-btn');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Ticking audio generator
        function playSpinTickSound() {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                osc.type = 'sine';
                osc.frequency.setValueAtTime(650, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.03);

                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.03);
            } catch (err) {
                console.warn('Audio error:', err);
            }
        }

        // Victory arpeggio chord synthesizer
        function playVictoryChord() {
            if (!audioCtx) return;
            try {
                const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
                const playTime = audioCtx.currentTime;
                
                notes.forEach((freq, index) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, playTime + index * 0.08);
                    
                    gain.gain.setValueAtTime(0, playTime + index * 0.08);
                    gain.gain.linearRampToValueAtTime(0.12, playTime + index * 0.08 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, playTime + index * 0.08 + 0.3);
                    
                    osc.start(playTime + index * 0.08);
                    osc.stop(playTime + index * 0.08 + 0.35);
                });
            } catch (err) {
                console.warn('Audio error:', err);
            }
        }

        // Pentatonic tune definition
        const pentatonicScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];
        const simpleSongPatterns = [
            [0, 2, 3, 4, 3, 2, 0, 0],
            [3, 4, 5, 4, 3, 2, 3, 3],
            [5, 7, 8, 7, 5, 4, 5, 5],
            [4, 3, 2, 0, 2, 3, 0, 0]
        ];
        let currentBar = 0;
        let currentStep = 0;

        function startBGM() {
            if (bgmIntervalId) return;
            initAudio();
            bgmIntervalId = setInterval(() => {
                if (!isBgmOn || !audioCtx) return;
                
                const stepPattern = simpleSongPatterns[currentBar];
                const scaleIndex = stepPattern[currentStep];
                const noteFreq = pentatonicScale[scaleIndex];

                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(noteFreq, audioCtx.currentTime);
                    
                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.02, audioCtx.currentTime + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.8);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.8);
                } catch (e) {}

                currentStep++;
                if (currentStep >= 8) {
                    currentStep = 0;
                    currentBar = (currentBar + 1) % simpleSongPatterns.length;
                }
            }, 300);
        }

        function stopBGM() {
            if (bgmIntervalId) {
                clearInterval(bgmIntervalId);
                bgmIntervalId = null;
            }
        }

        function toggleBGM() {
            initAudio();
            isBgmOn = !isBgmOn;
            if (isBgmOn) {
                bgmIndicator.classList.remove('bg-neutral-400');
                bgmIndicator.classList.add('bg-emerald-400');
                bgmIndicator.classList.add('animate-ping');
                bgmText.textContent = '🎶 ON';
                startBGM();
            } else {
                bgmIndicator.classList.remove('bg-emerald-400');
                bgmIndicator.classList.remove('animate-ping');
                bgmIndicator.classList.add('bg-neutral-400');
                bgmText.textContent = '🎵 OFF';
                stopBGM();
            }
        }

        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animationFrameId = null;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.size = Math.random() * 8 + 6;
                // Rich festive palette of colors
                const colors = [
                    '#ff007f', '#3b82f6', '#10b981', '#8b5cf6', '#fbbf24', 
                    '#f97316', '#ec4899', '#06b6d4', '#a855f7', '#22c55e'
                ];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = 1;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.15;
                this.gravity = 0.12;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.rotation += this.rotationSpeed;
                this.alpha -= 0.01;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function triggerConfetti() {
            // Sprays colorful confetti from both corners
            const leftCannonX = 0;
            const leftCannonY = window.innerHeight;
            for (let i = 0; i < 45; i++) {
                const angle = -Math.random() * 0.25 * Math.PI - 0.1 * Math.PI;
                const speed = Math.random() * 12 + 10;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                particles.push(new Particle(leftCannonX, leftCannonY, vx, vy));
            }

            const rightCannonX = window.innerWidth;
            const rightCannonY = window.innerHeight;
            for (let i = 0; i < 45; i++) {
                const angle = -Math.random() * 0.25 * Math.PI - 0.65 * Math.PI;
                const speed = Math.random() * 12 + 10;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                particles.push(new Particle(rightCannonX, rightCannonY, vx, vy));
            }

            if (!animationFrameId) {
                tickConfetti();
            }
        }

        function tickConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            if (particles.length > 0) {
                animationFrameId = requestAnimationFrame(tickConfetti);
            } else {
                animationFrameId = null;
            }
        }

        // Dynamic physical scaling rules for font size bounds
        function getTextScaleClass(text) {
            if (!text) return 'text-welcome';
            const len = text.replace(/ⁿ/g, 'n').replace(/o͘/g, 'o').length;
            if (len <= 1) return 'text-len-1';
            if (len === 2) return 'text-len-2';
            if (len === 3) return 'text-len-3';
            return 'text-len-4';
        }

        function buildReelDOM(reelElement, wordsList, startText, isRight) {
            reelElement.innerHTML = '';
            
            // Build initialization starter card
            const initItem = document.createElement('div');
            initItem.className = `flex items-center justify-center font-black bg-white ${isRight ? 'text-[#6b21a8]' : 'text-[#831843]'} select-none text-welcome prevent-clip`;
            initItem.style.height = `var(--item-h)`;
            initItem.style.width = `100%`;
            initItem.textContent = startText;
            reelElement.appendChild(initItem);

            const repeats = 4;
            for (let r = 0; r < repeats; r++) {
                wordsList.forEach(word => {
                    const item = document.createElement('div');
                    const textClass = getTextScaleClass(word);
                    item.className = `flex items-center justify-center font-black bg-white ${isRight ? 'text-[#7e22ce]' : 'text-[#be123c]'} select-none ${textClass} prevent-clip`;
                    item.style.height = `var(--item-h)`;
                    item.style.width = `100%`;
                    item.textContent = word;
                    reelElement.appendChild(item);
                });
            }
        }

        function initReels() {
            buildReelDOM(leftReel, leftWords, "Chún-pī", false);
            buildReelDOM(rightReel, rightWords, "Khai-sí", true);
            
            // Reset position immediately without delay
            leftReel.classList.add('slot-reel-instant');
            rightReel.classList.add('slot-reel-instant');
            leftReel.style.transform = `translateY(0px)`;
            rightReel.style.transform = `translateY(0px)`;
        }

        function spinReelIndividual(reelElement, listSize, targetIndex, onComplete) {
            playSpinTickSound();

            const itemHeight = reelElement.firstElementChild.offsetHeight;
            
            let ticksCount = 0;
            const tickInterval = setInterval(() => {
                if (ticksCount < 10) {
                    playSpinTickSound();
                    ticksCount++;
                } else {
                    clearInterval(tickInterval);
                }
            }, 120);

            const baseOffset = 1;
            const cycles = 2;
            const finalStopIndex = baseOffset + (cycles * listSize) + targetIndex;

            reelElement.classList.remove('slot-reel-instant');
            reelElement.style.transform = `translateY(-${finalStopIndex * itemHeight}px)`;

            setTimeout(() => {
                reelElement.classList.add('slot-reel-instant');
                const simplifiedIndex = baseOffset + targetIndex;
                reelElement.style.transform = `translateY(-${simplifiedIndex * itemHeight}px)`;
                if (onComplete) onComplete();
            }, 1500);
        }

        function cycleNextAction() {
            initAudio();
            
            if (currentCycleState === 'welcome') {
                currentCycleState = 'ready';
            }

            if (currentCycleState === 'ready') {
                triggerSynchronizedSpin();
            } else if (currentCycleState === 'idle') {
                triggerCelebrateStep();
            } else if (currentCycleState === 'celebrated') {
                advanceToNextChallenge();
            }
        }

        function triggerSynchronizedSpin() {
            if (currentCycleState === 'spinning') return;
            
            currentLeftTargetIdx = Math.floor(Math.random() * leftWords.length);
            currentRightTargetIdx = Math.floor(Math.random() * rightWords.length);

            currentCycleState = 'spinning';

            // Locking inputs with defensive overlay shields
            leftShield.classList.remove('pointer-events-none');
            rightShield.classList.remove('pointer-events-none');
            syncSpinBtn.disabled = true;

            let completedReels = 0;
            const completeCallback = () => {
                completedReels++;
                if (completedReels === 2) {
                    currentCycleState = 'idle';
                    syncSpinBtn.textContent = "Hô-hí! (評分)";
                    syncSpinBtn.disabled = false;
                    leftShield.classList.add('pointer-events-none');
                    rightShield.classList.add('pointer-events-none');
                }
            };

            spinReelIndividual(leftReel, leftWords.length, currentLeftTargetIdx, completeCallback);
            spinReelIndividual(rightReel, rightWords.length, currentRightTargetIdx, completeCallback);
        }

        function triggerCelebrateStep() {
            if (currentQuestion < totalQuestionsCount) {
                const dots = progressContainer.querySelectorAll('.progress-dot');
                const currentDot = dots[currentQuestion];
                if (currentDot) {
                    currentDot.classList.remove('border-white/45');
                    // Golden-amber solid glow
                    currentDot.classList.add('bg-amber-400', 'border-amber-300', 'shadow-[0_0_10px_#f59e0b]');
                }
            }

            playVictoryChord();
            triggerConfetti();

            currentCycleState = 'celebrated';
            syncSpinBtn.textContent = "Ē-chi̍t-tê! (下一題)";
        }

        function advanceToNextChallenge() {
            currentQuestion++;

            if (currentQuestion >= totalQuestionsCount) {
                completionOverlay.classList.remove('hidden');
                completionOverlay.classList.add('flex');
                playVictoryChord();
                setTimeout(triggerConfetti, 100);
                setTimeout(triggerConfetti, 400);
                setTimeout(triggerConfetti, 800);
            } else {
                currentCycleState = 'ready';
                syncSpinBtn.textContent = "Tâng-chê tńg!";
                triggerSynchronizedSpin();
            }
        }

        function setupIndividualSlotClicks() {
            document.getElementById('left-slot-trigger').addEventListener('click', (e) => {
                e.stopPropagation();
                initAudio();
                const tempIndex = Math.floor(Math.random() * leftWords.length);
                leftShield.classList.remove('pointer-events-none');
                spinReelIndividual(leftReel, leftWords.length, tempIndex, () => {
                    leftShield.classList.add('pointer-events-none');
                });
            });

            document.getElementById('right-slot-trigger').addEventListener('click', (e) => {
                e.stopPropagation();
                initAudio();
                const tempIndex = Math.floor(Math.random() * rightWords.length);
                rightShield.classList.remove('pointer-events-none');
                spinReelIndividual(rightReel, rightWords.length, tempIndex, () => {
                    rightShield.classList.add('pointer-events-none');
                });
            });
        }

        function buildProgressDots() {
            progressContainer.innerHTML = '';
            for (let i = 0; i < totalQuestionsCount; i++) {
                const dot = document.createElement('div');
                dot.className = `progress-dot w-3.5 h-3.5 sm:w-4 sm:h-4 rounded-full border-2 border-white/45 bg-transparent transition-all duration-300`;
                progressContainer.appendChild(dot);
            }
        }

        function renderChartGrids() {
            gridSia.innerHTML = '';
            gridPhi.innerHTML = '';

            leftWords.forEach(word => {
                const card = document.createElement('div');
                card.className = "bg-amber-100 hover:bg-amber-200 text-amber-950 font-bold p-3 text-center rounded-xl transition-all active:scale-95 duration-100 cursor-pointer shadow-sm text-lg sm:text-2xl border border-amber-300 prevent-clip flex items-center justify-center";
                card.textContent = word;
                card.addEventListener('click', () => {
                    initAudio();
                    playSpinTickSound();
                });
                gridSia.appendChild(card);
            });

            rightWords.forEach(word => {
                const card = document.createElement('div');
                card.className = "bg-purple-100 hover:bg-purple-200 text-purple-950 font-bold p-3 text-center rounded-xl transition-all active:scale-95 duration-100 cursor-pointer shadow-sm text-lg sm:text-2xl border border-purple-300 prevent-clip flex items-center justify-center";
                card.textContent = word;
                card.addEventListener('click', () => {
                    initAudio();
                    playSpinTickSound();
                });
                gridPhi.appendChild(card);
            });
        }

        function openSettingsPanel() {
            settingsInputsContainer.innerHTML = '';
            
            for (let i = 0; i < 18; i++) {
                const leftValue = leftWords[i] || '';
                const rightValue = rightWords[i] || '';

                const rowDiv = document.createElement('div');
                rowDiv.className = "grid grid-cols-2 gap-4";

                rowDiv.innerHTML = `
                    <input type="text" 
                           class="settings-left-item bg-[#0b1324] border border-slate-800 text-amber-200 text-center rounded-xl py-2 px-3 font-semibold tracking-wider focus:border-amber-400 focus:outline-none text-base sm:text-lg" 
                           value="${leftValue}" 
                           placeholder="-">
                    <input type="text" 
                           class="settings-right-item bg-[#0b1324] border border-slate-800 text-purple-300 text-center rounded-xl py-2 px-3 font-semibold tracking-wider focus:border-purple-400 focus:outline-none text-base sm:text-lg" 
                           value="${rightValue}" 
                           placeholder="-">
                `;
                settingsInputsContainer.appendChild(rowDiv);
            }

            settingsOverlay.classList.remove('hidden');
            settingsOverlay.classList.add('flex');
        }

        function closeSettingsPanel() {
            settingsOverlay.classList.add('hidden');
            settingsOverlay.classList.remove('flex');
        }

        function saveCustomSettings() {
            const leftInputs = document.querySelectorAll('.settings-left-item');
            const rightInputs = document.querySelectorAll('.settings-right-item');

            const cleanLeft = [];
            leftInputs.forEach(input => {
                const val = input.value.trim();
                if (val) {
                    cleanLeft.push(val);
                }
            });

            const cleanRight = [];
            rightInputs.forEach(input => {
                const val = input.value.trim();
                if (val) {
                    cleanRight.push(val);
                }
            });

            if (cleanLeft.length === 0 || cleanRight.length === 0) {
                return;
            }

            leftWords = cleanLeft;
            rightWords = cleanRight;

            localStorage.setItem('slot_left_words_sakura', JSON.stringify(leftWords));
            localStorage.setItem('slot_right_words_sakura', JSON.stringify(rightWords));

            closeSettingsPanel();
            restartEntireProgress();
        }

        function restartEntireProgress() {
            currentQuestion = 0;
            currentCycleState = 'welcome';
            syncSpinBtn.textContent = "Tâng-chê tńg!";
            completionOverlay.classList.add('hidden');
            completionOverlay.classList.remove('flex');

            initReels();
            buildProgressDots();
            renderChartGrids();
        }

        function isInteractionLocked() {
            const isSettingsOpen = !settingsOverlay.classList.contains('hidden');
            const isChartOpen = !chartOverlay.classList.contains('hidden');
            const isCompletedOpen = !completionOverlay.classList.contains('hidden');
            
            const activeEl = document.activeElement;
            const isTyping = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA');

            return isSettingsOpen || isChartOpen || isCompletedOpen || isTyping;
        }

        function setupInteractiveKeyboards() {
            const actionKeys = ['Space', ' ', 'Enter', 'PageDown', 'PageUp', 'ArrowDown', 'ArrowUp', 'ArrowLeft', 'ArrowRight'];

            window.addEventListener('keydown', (e) => {
                if (isInteractionLocked()) return;

                if (actionKeys.includes(e.key) || e.code === 'Space') {
                    e.preventDefault();
                    cycleNextAction();
                }
            });

            window.addEventListener('click', (e) => {
                if (isInteractionLocked()) return;

                const clickedButton = e.target.closest('button') || e.target.closest('#left-slot-trigger') || e.target.closest('#right-slot-trigger');
                if (clickedButton) return;

                cycleNextAction();
            });
        }

        function setupOverlayTriggers() {
            gearBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                openSettingsPanel();
            });
            cancelSettingsBtn.addEventListener('click', closeSettingsPanel);
            saveSettingsBtn.addEventListener('click', saveCustomSettings);

            chartBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                chartOverlay.classList.remove('hidden');
                chartOverlay.classList.add('flex');
            });
            closeChartBtn.addEventListener('click', () => {
                chartOverlay.classList.add('hidden');
                chartOverlay.classList.remove('flex');
            });

            syncSpinBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                cycleNextAction();
            });

            resetGameBtn.addEventListener('click', restartEntireProgress);

            bgmToggleBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                toggleBGM();
            });
        }

        // Run application sequence on page load
        window.onload = function() {
            initReels();
            buildProgressDots();
            renderChartGrids();
            setupIndividualSlotClicks();
            setupInteractiveKeyboards();
            setupOverlayTriggers();
        };
    </script>
</body>
</html>
